# config/kitty/kitty.conf
#
# Configuración de kitty (emulador de terminal). Se eligió kitty por ser
# potente (aceleración por GPU, ligaduras, control remoto) y a la vez
# fácil de modificar: es un archivo de texto plano de pares
# "directiva valor", sin sintaxis anidada compleja.
#
# Para ver todas las opciones disponibles (cientos), genera la plantilla
# completa con comentarios oficiales:
#   kitty +runpy "from kitty.config import generate_default_config; print(generate_default_config())" > kitty.conf.full

# --- Fuente -----------------------------------------------------------
font_family      JetBrainsMono Nerd Font
bold_font        JetBrainsMono Nerd Font Bold
italic_font      JetBrainsMono Nerd Font Italic
bold_italic_font JetBrainsMono Nerd Font Bold Italic
font_size 11.0

# --- Cursor -----------------------------------------------------------
cursor_shape block
cursor_blink_interval 0.5

# --- Apariencia de ventana ---------------------------------------------
background_opacity 0.95
window_padding_width 6
hide_window_decorations yes

# --- Barra de pestañas ---------------------------------------------------
tab_bar_edge bottom
tab_bar_style fade

# --- Scrollback ---------------------------------------------------------
scrollback_lines 10000

# --- Colores (tema oscuro simple, consistente con waybar/wofi) ---------
foreground #c5c8c6
background #1d1f21

color0  #1d1f21
color8  #969896
color1  #cc6666
color9  #cc6666
color2  #b5bd68
color10 #b5bd68
color3  #f0c674
color11 #f0c674
color4  #81a2be
color12 #81a2be
color5  #b294bb
color13 #b294bb
color6  #8abeb7
color14 #8abeb7
color7  #c5c8c6
color15 #ffffff

# --- Atajos propios de kitty (no de sway) -------------------------------
# Estos atajos funcionan DENTRO de kitty (pestañas, fuente, etc.), no
# hay que confundirlos con los de sway/config (que controlan ventanas).
map ctrl+shift+t new_tab
map ctrl+shift+w close_tab
map ctrl+shift+equal change_font_size all +1.0
map ctrl+shift+minus change_font_size all -1.0
map ctrl+shift+backspace change_font_size all 0

# --- Permite control remoto (usado por algunos scripts/integraciones) -
allow_remote_control yes
